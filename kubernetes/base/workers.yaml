apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-monitor-scanner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-monitor-scanner
  template:
    metadata:
      labels:
        app: health-monitor-scanner
    spec:
      initContainers:
        - name: wait-for-health-monitor-db
          image: asset_monitoring_system-health-monitor-scanner:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-lc", "until php -r '$s=@fsockopen(\"health-monitor-db\",5432); if ($s) { fclose($s); exit(0);} exit(1);'; do echo waiting for health-monitor-db; sleep 2; done"]
        - name: wait-for-rabbitmq
          image: asset_monitoring_system-health-monitor-scanner:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-lc", "until php -r '$s=@fsockopen(\"rabbitmq\",5672); if ($s) { fclose($s); exit(0);} exit(1);'; do echo waiting for rabbitmq; sleep 2; done"]
      containers:
        - name: health-monitor-scanner
          image: asset_monitoring_system-health-monitor-scanner:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - while true; do php artisan health:scan-inactive; sleep 60; done
          env:
            - {name: APP_ENV, value: local}
            - {name: APP_DEBUG, value: "true"}
            - {name: DB_CONNECTION, value: pgsql}
            - {name: DB_HOST, value: health-monitor-db}
            - {name: DB_PORT, value: "5432"}
            - {name: DB_DATABASE, value: health_monitor_db}
            - name: DB_USERNAME
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: db-username}}
            - name: DB_PASSWORD
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: db-password}}
            - {name: CACHE_STORE, value: file}
            - {name: DEVICE_INACTIVE_AFTER_MINUTES, value: "10"}
            - {name: RABBITMQ_HOST, value: rabbitmq}
            - {name: RABBITMQ_PORT, value: "5672"}
            - name: RABBITMQ_USER
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-user}}
            - name: RABBITMQ_PASSWORD
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-password}}
            - name: RABBITMQ_VHOST
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-vhost}}
            - name: RABBITMQ_EXCHANGE
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-exchange}}
            - {name: RABBITMQ_QUEUE_PREFIX, value: health}
            - {name: TELESCOPE_ENABLED, value: "true"}
            - {name: TELESCOPE_SERVICE_NAME, value: health-monitor-service}
