apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-user-sync-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assignment-user-sync-worker
  template:
    metadata:
      labels:
        app: assignment-user-sync-worker
    spec:
      initContainers:
        - name: wait-for-assignment-db
          image: asset_monitoring_system-assignment-user-sync-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-lc", "until php -r '$s=@fsockopen(\"assignment-db\",5432); if ($s) { fclose($s); exit(0);} exit(1);'; do echo waiting for assignment-db; sleep 2; done"]
        - name: wait-for-rabbitmq
          image: asset_monitoring_system-assignment-user-sync-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-lc", "until php -r '$s=@fsockopen(\"rabbitmq\",5672); if ($s) { fclose($s); exit(0);} exit(1);'; do echo waiting for rabbitmq; sleep 2; done"]
      containers:
        - name: assignment-user-sync-worker
          image: asset_monitoring_system-assignment-user-sync-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["php", "artisan", "assignments:consume-user-sync"]
          env:
            - {name: APP_ENV, value: local}
            - {name: APP_DEBUG, value: "true"}
            - {name: DB_CONNECTION, value: pgsql}
            - {name: DB_HOST, value: assignment-db}
            - {name: DB_PORT, value: "5432"}
            - {name: DB_DATABASE, value: assignment_db}
            - name: DB_USERNAME
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: db-username}}
            - name: DB_PASSWORD
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: db-password}}
            - {name: CACHE_STORE, value: file}
            - {name: INVENTORY_SERVICE_BASE_URL, value: http://inventory-service:8000}
            - {name: CIRCUIT_BREAKER_FAILURE_THRESHOLD, value: "3"}
            - {name: CIRCUIT_BREAKER_OPEN_SECONDS, value: "30"}
            - {name: CIRCUIT_BREAKER_TIMEOUT_SECONDS, value: "2"}
            - {name: RABBITMQ_HOST, value: rabbitmq}
            - {name: RABBITMQ_PORT, value: "5672"}
            - name: RABBITMQ_USER
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-user}}
            - name: RABBITMQ_PASSWORD
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-password}}
            - name: RABBITMQ_VHOST
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-vhost}}
            - name: RABBITMQ_EXCHANGE
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-exchange}}
            - {name: RABBITMQ_QUEUE_PREFIX, value: assignment}
            - {name: TELESCOPE_ENABLED, value: "true"}
            - {name: TELESCOPE_SERVICE_NAME, value: assignment-service}
---
