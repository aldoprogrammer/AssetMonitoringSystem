apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  selector:
    app: identity-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      initContainers:
        - name: prepare-identity-storage
          image: asset_monitoring_system-identity-service:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - mkdir -p /var/www/app/storage/framework/cache /var/www/app/storage/framework/sessions /var/www/app/storage/framework/views /var/www/app/storage/logs
          volumeMounts:
            - name: identity-storage
              mountPath: /var/www/app/storage
        - name: wait-for-identity-db
          image: asset_monitoring_system-identity-service:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-lc", "until php -r '$s=@fsockopen(\"identity-db\",5432); if ($s) { fclose($s); exit(0);} exit(1);'; do echo waiting for identity-db; sleep 2; done"]
        - name: wait-for-rabbitmq
          image: asset_monitoring_system-identity-service:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-lc", "until php -r '$s=@fsockopen(\"rabbitmq\",5672); if ($s) { fclose($s); exit(0);} exit(1);'; do echo waiting for rabbitmq; sleep 2; done"]
      containers:
        - name: identity-service
          image: asset_monitoring_system-identity-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - {name: PASSPORT_ENABLED, value: "true"}
            - {name: APP_ENV, value: local}
            - {name: APP_DEBUG, value: "true"}
            - {name: APP_URL, value: http://api.asset-monitoring-system.local/api/v1/identity}
            - {name: DB_CONNECTION, value: pgsql}
            - {name: DB_HOST, value: identity-db}
            - {name: DB_PORT, value: "5432"}
            - {name: DB_DATABASE, value: identity_db}
            - name: DB_USERNAME
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: db-username}}
            - name: DB_PASSWORD
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: db-password}}
            - {name: QUEUE_CONNECTION, value: sync}
            - {name: CACHE_STORE, value: file}
            - {name: SESSION_DRIVER, value: file}
            - {name: LOG_CHANNEL, value: stack}
            - {name: RABBITMQ_HOST, value: rabbitmq}
            - {name: RABBITMQ_PORT, value: "5672"}
            - name: RABBITMQ_USER
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-user}}
            - name: RABBITMQ_PASSWORD
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-password}}
            - name: RABBITMQ_VHOST
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-vhost}}
            - name: RABBITMQ_EXCHANGE
              valueFrom: {secretKeyRef: {name: asset-monitoring-system-secrets, key: rabbitmq-exchange}}
            - {name: RABBITMQ_QUEUE_PREFIX, value: identity}
            - {name: TELESCOPE_ENABLED, value: "true"}
            - {name: TELESCOPE_PATH, value: identity/telescope}
            - {name: TELESCOPE_SERVICE_NAME, value: identity-service}
          volumeMounts:
            - name: identity-storage
              mountPath: /var/www/app/storage
          readinessProbe:
            httpGet: {path: /up, port: 8000}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /up, port: 8000}
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: identity-storage
          persistentVolumeClaim:
            claimName: identity-storage
---
