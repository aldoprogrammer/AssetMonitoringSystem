openapi: 3.0.3
info:
  title: AssetMonitoringSystem Identity Service
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/identity/auth/login:
    post:
      tags: [Identity]
      summary: Authenticate a user and return a Passport access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@assetmonitoringsystem.local
                password:
                  type: string
                  example: AdminPass123!
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_type:
                    type: string
                    example: Bearer
                  access_token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
  /api/v1/identity/users:
    get:
      tags: [Identity]
      summary: List users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User collection
    post:
      tags: [Identity]
      summary: Create user
      description: Creates a user. The backend auto-generates the user's UUID. Use `employee_uuid` only to link this user to an existing employee record.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                employee_id:
                  type: string
                  format: uuid
                  example: 7d824845-401b-4d93-afab-9a3f9c709a6c
                  description: Existing employee ID in UUID format to associate with this user.
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, staff]
      responses:
        '200':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
  /api/v1/identity/users/{user}:
    parameters:
      - name: user
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Identity]
      summary: Get user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User detail
    put:
      tags: [Identity]
      summary: Update user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, staff]
      responses:
        '200':
          description: Updated user
  /api/v1/identity/employees:
    get:
      tags: [Identity]
      summary: List employees
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Employee collection
    post:
      tags: [Identity]
      summary: Create employee
      description: Creates an employee. The backend auto-generates the employee UUID.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_code, full_name, department, job_title, email]
              properties:
                employee_code:
                  type: string
                full_name:
                  type: string
                department:
                  type: string
                job_title:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Created employee
  /api/v1/identity/employees/{employee}:
    parameters:
      - name: employee
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Identity]
      summary: Get employee
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Employee detail
    put:
      tags: [Identity]
      summary: Update employee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated employee
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, staff]
    UserEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
