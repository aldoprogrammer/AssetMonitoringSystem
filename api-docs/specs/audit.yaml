openapi: 3.0.3
info:
  title: AssetMonitoringSystem Audit Service
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/audit/logs:
    get:
      tags: [Audit]
      summary: List centralized audit logs
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for paginated results.
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: per_page
          in: query
          description: Optional page size. The backend currently defaults to 25 items.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 25
      responses:
        '200':
          description: Audit log collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogCollectionResponse'
components:
  schemas:
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_type:
          type: string
        routing_key:
          type: string
        source_service:
          type: string
        payload:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
    AuditLogCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
