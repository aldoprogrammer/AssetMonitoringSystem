openapi: 3.0.3
info:
  title: AssetMonitoringSystem Inventory Service
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/inventory/assets:
    get:
      tags: [Inventory]
      summary: List assets
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for paginated results.
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: per_page
          in: query
          description: Optional page size. The backend currently defaults to 15 items.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 15
      responses:
        '200':
          description: Asset collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCollectionResponse'
    post:
      tags: [Inventory]
      summary: Create asset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serial_number, asset_tag, specs, status]
              properties:
                serial_number:
                  type: string
                asset_tag:
                  type: string
                specs:
                  type: object
                  additionalProperties: true
                status:
                  type: string
                  enum: [available, assigned, maintenance, retired]
      responses:
        '200':
          description: Created asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetEnvelope'
  /api/v1/inventory/assets/{asset}:
    get:
      tags: [Inventory]
      summary: Get asset
      security:
        - bearerAuth: []
      parameters:
        - name: asset
          in: path
          required: true
          description: Public asset UUID returned by the API.
          schema:
            type: string
            format: uuid
            example: 4fc7a1c1-0133-4a70-95d2-c6c0847e1703
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetEnvelope'
    put:
      tags: [Inventory]
      summary: Update asset
      security:
        - bearerAuth: []
      parameters:
        - name: asset
          in: path
          required: true
          description: Public asset UUID returned by the API.
          schema:
            type: string
            format: uuid
            example: 4fc7a1c1-0133-4a70-95d2-c6c0847e1703
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serial_number:
                  type: string
                  example: LAP-1001
                asset_tag:
                  type: string
                  example: AST-1001
                specs:
                  type: object
                  additionalProperties: true
                  example:
                    cpu: Intel Core i7
                    ram: 16GB
                    storage: 512GB SSD
                status:
                  type: string
                  enum: [available, assigned, maintenance, retired]
                  example: maintenance
      responses:
        '200':
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetEnvelope'
  /api/v1/inventory/assets/serial/{serialNumber}/status:
    get:
      tags: [Inventory]
      summary: Validate asset availability by serial number
      security:
        - bearerAuth: []
      parameters:
        - name: serialNumber
          in: path
          required: true
          description: Asset serial number to validate against the inventory catalog.
          schema:
            type: string
            example: LAP-1001
      responses:
        '200':
          description: Asset availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetAvailabilityResponse'
components:
  schemas:
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        serial_number:
          type: string
        asset_tag:
          type: string
        specs:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [available, assigned, maintenance, retired]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AssetEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Asset'
    AssetCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    AssetAvailabilityResponse:
      type: object
      properties:
        serial_number:
          type: string
        status:
          type: string
        available:
          type: boolean
