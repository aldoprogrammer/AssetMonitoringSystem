worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format asset_monitoring_system_json escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request","status":$status,'
        '"request_time":$request_time,"upstream_addr":"$upstream_addr","upstream_response_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log asset_monitoring_system_json;
    error_log /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=asset_monitoring_system_api_limit:10m rate=25r/s;

    upstream identity_service {
        server identity-service:8000;
    }

    upstream inventory_service {
        server inventory-service:8000;
    }

    upstream assignment_service {
        server assignment-service:8000;
    }

    upstream health_monitor_service {
        server health-monitor-service:8000;
    }

    upstream audit_service {
        server audit-service:8000;
    }

    upstream notification_service {
        server notification-service:8000;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        location /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location /api/v1/identity/ {
            limit_req zone=asset_monitoring_system_api_limit burst=50 nodelay;
            proxy_pass http://identity_service/api/v1/;
        }

        location /api/v1/inventory/ {
            limit_req zone=asset_monitoring_system_api_limit burst=50 nodelay;
            proxy_pass http://inventory_service/api/v1/;
        }

        location /api/v1/assignments/ {
            limit_req zone=asset_monitoring_system_api_limit burst=50 nodelay;
            proxy_pass http://assignment_service/api/v1/assignments/;
        }

        location = /api/v1/assignments {
            limit_req zone=asset_monitoring_system_api_limit burst=50 nodelay;
            proxy_pass http://assignment_service/api/v1/assignments;
        }

        location /api/v1/health/ {
            limit_req zone=asset_monitoring_system_api_limit burst=50 nodelay;
            proxy_pass http://health_monitor_service/api/v1/;
        }

        location /api/v1/audit/ {
            limit_req zone=asset_monitoring_system_api_limit burst=30 nodelay;
            proxy_pass http://audit_service/api/v1/;
        }

        location /api/v1/notifications/ {
            limit_req zone=asset_monitoring_system_api_limit burst=30 nodelay;
            proxy_pass http://notification_service/api/v1/;
        }
    }
}
