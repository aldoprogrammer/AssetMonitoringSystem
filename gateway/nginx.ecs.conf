worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format asset_monitoring_system_json escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request","status":$status,'
        '"request_time":$request_time}';

    access_log /var/log/nginx/access.log asset_monitoring_system_json;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location / {
            default_type application/json;
            return 503 '{"message":"Gateway is running, but upstream API services are not deployed on ECS yet."}';
        }
    }
}
